name: CI - Tests y métricas

on:
  push:
    branches: [main, "feature/**", "docs/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v7

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Ejecutar tests
        run: python -m pytest tests/ -v --tb=short

  train:
    name: Entrenar modelo y guardar métricas
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Ejecutar entrenamiento
        run: python -m scripts.entrenar

      - name: Guardar métricas como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: metricas-modelo
          path: outputs/metrics.json
          retention-days: 30